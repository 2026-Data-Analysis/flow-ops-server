spring:
  application:
    name: flowops
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

server:
  port: ${PORT:${SERVER_PORT:8080}}
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

jasypt:
  encryptor:
    algorithm: ${JASYPT_ENCRYPTOR_ALGORITHM:PBEWITHHMACSHA512ANDAES_256}
    key-obtention-iterations: ${JASYPT_ENCRYPTOR_KEY_OBTENTION_ITERATIONS:1000}
    iv-generator-classname: ${JASYPT_ENCRYPTOR_IV_GENERATOR_CLASSNAME:org.jasypt.iv.RandomIvGenerator}
    string-output-type: ${JASYPT_ENCRYPTOR_STRING_OUTPUT_TYPE:base64}

logging:
  level:
    root: INFO
    flowops: INFO
    org.springframework.web: INFO

external:
  github:
    api-url: ${GITHUB_API_URL:https://api.github.com}
    token: ${GITHUB_TOKEN:}
    mock-enabled: ${GITHUB_MOCK_ENABLED:false}
  ai:
    base-url: ${AI_SERVER_BASE_URL:http://localhost:8000}
    api-key: ${AI_SERVER_API_KEY:}
    connect-timeout-millis: ${AI_CONNECT_TIMEOUT_MILLIS:3000}
    read-timeout-millis: ${AI_READ_TIMEOUT_MILLIS:10000}

app:
  security:
    allowed-origins: "${APP_ALLOWED_ORIGINS:${APP_ALLOWED_ORIGIN:http://localhost:3000}}"
