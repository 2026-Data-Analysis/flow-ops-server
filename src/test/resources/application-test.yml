spring:
  datasource:
    url: jdbc:h2:mem:flowops-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
  web:
    resources:
      add-mappings: false

jasypt:
  encryptor:
    password: test-only

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
