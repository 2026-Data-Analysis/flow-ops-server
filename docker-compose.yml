services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: flowops
      DB_USERNAME: flowops
      DB_PASSWORD: flowops
      AI_SERVER_BASE_URL: http://ai-server:8000
      APP_ALLOWED_ORIGIN: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: flowops
      POSTGRES_USER: flowops
      POSTGRES_PASSWORD: flowops
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowops -d flowops"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
